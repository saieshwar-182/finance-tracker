<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>

  <div class="header">
    <h1>Expense Tracker</h1>
    <div class="summary">
      <div class="box green">
        <span>Income</span>
        <strong id="totalIncome">₹0</strong>
      </div>
      <div class="box red">
        <span>Expense</span>
        <strong id="totalExpense">₹0</strong>
      </div>
      <div class="box blue">
        <span>Balance</span>
        <strong id="balance">₹0</strong>
      </div>
    </div>
  </div>

  <div class="container">

    <div class="form-card">
      <div class="toggle">
        <button class="active expense" id="btnExpense" onclick="setType('expense')">− Expense</button>
        <button id="btnIncome" onclick="setType('income')">+ Income</button>
      </div>
      <input type="number" id="amtInput" placeholder="Amount (₹)" />
      <select id="catSelect">
        <option value="Groceries">🛒 Groceries</option>
        <option value="Rent">🏠 Rent</option>
        <option value="Utilities">⚡ Utilities</option>
        <option value="Health">💊 Health</option>
        <option value="Travel">🚗 Travel</option>
        <option value="Dining">🍽️ Dining</option>
        <option value="Other">📦 Other</option>
      </select>
      <input type="text" id="noteInput" placeholder="Note (optional)" />
      <input type="date" id="dateInput" />
      <button class="add-btn" onclick="addEntry()">Add Entry</button>
    </div>

    <h2>Recent Transactions</h2>
    <div id="txnList">
      <p class="empty">No transactions yet.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
